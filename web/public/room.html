<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>辩论室 · Debate Agents Party</title>
<link rel="stylesheet" href="/css/app.css" />
</head>
<body>
<div class="room-shell">
  <!-- history drawer -->
  <div id="drawer-mask" class="drawer-mask"></div>
  <aside id="drawer" class="drawer">
    <div class="drawer-head">
      <span>📜 历史 Sessions</span>
      <button id="drawer-close" class="ghost" style="padding:2px 8px;">×</button>
    </div>
    <div id="drawer-list" class="drawer-list">加载中…</div>
  </aside>
  <div class="room-head">
    <div class="room-head-inner" style="display:flex;align-items:center;gap:12px;">
      <button id="home" class="ghost" title="返回主页" style="flex-shrink:0;">← 主页</button>
      <div style="flex:1;min-width:0;">
        <div class="topic" id="topic">加载中…</div>
        <div class="meta" id="meta"></div>
      </div>
    </div>
  </div>
  <div class="status-bar"><div class="status-inner" id="status">连接中…</div></div>
  <div class="msgs" id="msgs"><div class="msgs-inner" id="msgs-inner"></div></div>
  <div id="thinking-area"><div class="thinking-inner" id="thinking-inner"></div></div>
  <div class="composer">
    <div class="composer-inner" style="display:flex;gap:8px;width:100%;">
      <input type="text" id="input" placeholder="随时插话,主持人下一轮会安排回应…" autofocus />
      <button id="send">发送</button>
      <button id="start" class="ghost" title="开始一场新辩论" style="display:none;">开始辩论</button>
      <button id="restart" class="ghost" title="重新发起辩论(可改议题)">重启</button>
      <button id="history" class="ghost" title="查看历史 session">📜 历史</button>
      <button id="finalize" class="ghost" title="生成最终总结并结束">结束辩论</button>
      <button id="back" class="ghost">返回</button>
    </div>
  </div>
</div>
<script src="/vendor/jquery.min.js"></script>
<script src="/vendor/marked.min.js"></script>
<script src="/vendor/dompurify.min.js"></script>
<script src="/js/room.js"></script>
</body>
</html>
