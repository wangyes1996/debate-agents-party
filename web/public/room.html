<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>辩论室 · Debate Agents Party</title>
<link rel="stylesheet" href="/css/app.css" />
</head>
<body>
<div class="room-shell">
  <div class="room-head">
    <div class="topic" id="topic">…</div>
    <div class="meta" id="meta"></div>
  </div>
  <div class="status-bar" id="status">连接中…</div>
  <div class="msgs" id="msgs"></div>
  <div id="thinking-area"></div>
  <div class="composer">
    <input type="text" id="input" placeholder="随时插话,所有 agent 会立刻看到并优先回应…" autofocus />
    <button id="send">发送</button>
    <button id="back" class="ghost">返回</button>
  </div>
</div>
<script src="/vendor/jquery.min.js"></script>
<script src="/js/room.js"></script>
</body>
</html>
