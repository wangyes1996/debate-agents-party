<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Debate Agents Party</title>
<link rel="stylesheet" href="/css/app.css" />
</head>
<body>
<div class="topbar">
  <div class="brand">⚔️ Debate Agents Party</div>
  <nav>
    <a href="/" class="active">辩论室</a>
    <a href="/agents">Agents</a>
    <a href="/config">LLM 配置</a>
  </nav>
</div>
<div class="container">
  <div class="card">
    <h1>辩论室列表 🎙️</h1>
    <p class="muted">每个辩论室有自己的议题、主持人和参与 agent。点击进入即可开始一场新的辩论。</p>
    <button id="new-room">+ 新建辩论室</button>
    <span id="msg" class="muted" style="margin-left:10px"></span>
  </div>

  <div id="rooms" class="rooms-grid"></div>
</div>

<!-- New / edit room modal -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h2 id="modal-title">新建辩论室</h2>
    <div class="field">
      <label>名称</label>
      <input type="text" id="m-name" placeholder="如:AI 会取代程序员吗?" />
    </div>
    <div class="field">
      <label>辩论议题(给 agent 看的)</label>
      <textarea id="m-topic" placeholder="详细描述你希望大家辩论的问题"></textarea>
    </div>
    <div class="row">
      <div class="field" style="flex:1">
        <label>主持人</label>
        <select id="m-moderator"></select>
      </div>
      <div class="field" style="flex:1">
        <label>最大轮次</label>
        <input type="number" id="m-turns" value="16" min="4" max="60" />
      </div>
    </div>
    <div class="field">
      <label>参与 agent(点击选/取消,至少 2 个)</label>
      <div class="role-grid" id="m-agents"></div>
    </div>
    <div class="row">
      <button id="m-save">保存</button>
      <button id="m-cancel" class="ghost">取消</button>
      <span id="m-msg" class="muted"></span>
    </div>
  </div>
</div>

<script src="/vendor/jquery.min.js"></script>
<script src="/js/index.js"></script>
</body>
</html>
