<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LLM 配置 · Debate Agents Party</title>
<link rel="stylesheet" href="/css/app.css" />
</head>
<body>
<div class="topbar">
  <div class="brand">⚔️ Debate Agents Party</div>
  <nav>
    <a href="/">辩论室</a>
    <a href="/agents">Agents</a>
    <a href="/config" class="active">LLM 配置</a>
  </nav>
</div>
<div class="container">
  <div class="card">
    <h1>LLM 配置</h1>
    <p class="muted">管理所有可用的 LLM(火山方舟、OpenAI、DeepSeek…)。每个 agent 可在 Agents 页选择自己的 LLM,留空则使用下方的默认 LLM。</p>
  </div>

  <div class="card">
    <h2>LLM 列表</h2>
    <div class="llm-list" id="llms"></div>
    <button id="add-llm" class="ghost" style="margin-top:10px">+ 添加 LLM</button>
  </div>

  <div class="card">
    <h2>默认 LLM</h2>
    <select id="default-llm"></select>
  </div>

  <div class="row">
    <button id="save">💾 保存</button>
    <span id="msg" class="muted"></span>
  </div>
</div>
<script src="/vendor/jquery.min.js"></script>
<script src="/js/config.js"></script>
</body>
</html>
